<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>手机号登录模拟</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
}
h1 {
    color: #4f46e5;
    margin-bottom: 20px;
}
input {
    width: 80%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button {
    width: 85%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    background-color: #4f46e5;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:disabled {
    background-color: #999;
}
#message {
    color: green;
    margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
<h1>手机号登录模拟</h1>
<input type="text" id="phone" placeholder="请输入手机号"><br>
<button id="getCodeBtn">获取验证码</button><br>
<input type="text" id="code" placeholder="请输入验证码"><br>
<button id="loginBtn">登录</button>
<div id="message"></div>
</div>

<script>
let generatedCode = "";

document.getElementById("getCodeBtn").addEventListener("click", function() {
    const phone = document.getElementById("phone").value;
    if(!phone.match(/^\d{10,15}$/)){
        alert("请输入正确手机号");
        return;
    }
    // 生成6位随机验证码
    generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
    alert("模拟验证码已发送: " + generatedCode);
    document.getElementById("message").innerText = "验证码已发送，请输入验证码登录";
});

document.getElementById("loginBtn").addEventListener("click", function() {
    const codeInput = document.getElementById("code").value;
    if(codeInput === generatedCode){
        alert("登录成功 🎉");
        document.getElementById("message").innerText = "登录成功！";
    } else {
        alert("验证码错误 ❌");
        document.getElementById("message").innerText = "验证码错误，请重试";
    }
});
</script>
</body>
</html>
